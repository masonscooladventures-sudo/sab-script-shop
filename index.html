<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VR Hub Control Center</title>

<style>
body {
  margin: 0;
  background: #0b0f1a;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* Sci-fi background */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* Layout */
.container {
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: rgba(15, 22, 38, 0.9);
  padding: 20px;
}

.btn {
  background: #12182a;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #4c6fff;
  transform: translateX(5px);
}

/* Main */
.main {
  flex: 1;
  padding: 20px;
}

.card {
  background: rgba(18,24,42,0.85);
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* AI box */
#chat {
  height: 200px;
  overflow-y: auto;
  background: #0f1626;
  padding: 10px;
  border-radius: 10px;
}

/* Input */
input {
  width: 80%;
  padding: 10px;
  border-radius: 10px;
  border: none;
}
button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #4c6fff;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>VR HUB</h2>
    <div class="btn" onclick="startMirror()">📡 Screen Mirror</div>
    <div class="btn" onclick="toggleAI()">🧠 AI Assistant</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- SCREEN MIRROR -->
    <div class="card" id="mirrorCard">
      <h3>📡 Headset Screen Mirror</h3>
      <button onclick="startMirror()">Start Sharing</button>
      <p id="mirrorStatus">Not connected</p>
    </div>

    <!-- AI -->
    <div class="card" id="aiCard" style="display:none;">
      <h3>🧠 AI Assistant</h3>

      <div id="chat"></div>
      <br>

      <input id="msg" placeholder="Ask something...">
      <button onclick="sendMsg()">Send</button>
    </div>

  </div>
</div>

<script>
// ---------- SCI-FI BACKGROUND ----------
const c = document.getElementById("bg");
const ctx = c.getContext("2d");
c.width = window.innerWidth;
c.height = window.innerHeight;

let dots = Array.from({length: 60}, () => ({
  x: Math.random()*c.width,
  y: Math.random()*c.height
}));

function draw() {
  ctx.clearRect(0,0,c.width,c.height);
  ctx.strokeStyle = "#4c6fff";

  dots.forEach(d => {
    ctx.beginPath();
    ctx.arc(d.x,d.y,2,0,Math.PI*2);
    ctx.stroke();

    d.y += 1;
    if(d.y > c.height) d.y = 0;
  });

  requestAnimationFrame(draw);
}
draw();


// ---------- SCREEN MIRROR (SAFE: user permission) ----------
async function startMirror() {
  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({
      video: true
    });

    document.getElementById("mirrorStatus").innerText =
      "✅ Sharing active (user-approved)";

    // You could attach stream to a video element if you want:
    console.log(stream);

  } catch (e) {
    alert("Screen share cancelled or blocked.");
  }
}


// ---------- AI ASSISTANT (simple local demo) ----------
function toggleAI() {
  const ai = document.getElementById("aiCard");
  ai.style.display = ai.style.display === "none" ? "block" : "none";
}

function sendMsg() {
  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");

  const userText = input.value;
  if(!userText) return;

  chat.innerHTML += "<div><b>You:</b> " + userText + "</div>";

  let reply = "I'm a local VR assistant. Try asking about VR tools or setup.";

  if(userText.toLowerCase().includes("hello")) {
    reply = "Hey 👋 VR Hub is online.";
  }

  if(userText.toLowerCase().includes("quest")) {
    reply = "This hub can connect to VR devices using browser sharing + external tools.";
  }

  chat.innerHTML += "<div><b>AI:</b> " + reply + "</div>";

  input.value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
